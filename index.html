<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4CAF50">

<title>오리지날 LEE</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f4f4f4;
font-size:20px;
text-align:center;
}

/* 상단 타이틀 */

header{
background:#4CAF50;
color:white;
padding:22px;
font-size:34px;
font-weight:bold;
}

/* 페이지 */

.page{
display:none;
padding:20px;
padding-bottom:120px;
}

.active{
display:block;
}

/* 카드 */

.card{
background:white;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
font-size:24px;
}

/* 가족 이미지 */

.family-img{
width:90%;
max-width:350px;
border-radius:20px;
margin:20px auto;
display:block;
}

/* 말씀 */

.verse-title{
font-size:26px;
font-weight:bold;
margin-top:10px;
}

.verse-text{
font-size:22px;
margin-top:10px;
line-height:1.6;
}

/* 입력 */

input{
width:95%;
padding:18px;
font-size:22px;
border-radius:10px;
border:1px solid #ccc;
margin-top:15px;
}

/* 버튼 */

button{
margin-top:15px;
padding:15px 30px;
font-size:22px;
border-radius:10px;
border:none;
background:#4CAF50;
color:white;
}

/* 하단 메뉴 */

.navbar{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-between;
gap:0;
padding:10px 6px;
box-sizing:border-box;
overflow-x:hidden;
overflow-y:hidden;
white-space:normal;
-webkit-overflow-scrolling:touch;
box-shadow:0 -2px 8px rgba(0,0,0,0.2);
}

.navbar::-webkit-scrollbar{
display:none;
}

.navbar{
scrollbar-width:none;
-ms-overflow-style:none;
}

.navbtn{
font-size:28px;
padding:8px 0;
margin:0;
flex:1 1 20%;
min-width:0;
background:none;
border:none;
}

@media (max-width:380px){
.navbar{
padding:8px 6px;
}

.navbtn{
font-size:24px;
padding:6px 0;
}
}

.photo-input{
width:95%;
margin-top:15px;
font-size:18px;
}

.gallery-img{
width:100%;
max-width:420px;
border-radius:16px;
display:block;
margin:0 auto;
}

</style>

</head>

<body>

<header>
오리지날 LEE
</header>


<!-- 홈 -->

<div id="home" class="page active">

<img src="family.jpg" class="family-img">

<div class="card">

<div class="verse-title">
📖 오늘의 말씀
</div>

<div id="verseText" class="verse-text">



</div>

</div>

</div>


<!-- 기도 -->

<div id="pray" class="page">

<div class="card">

🙏 기도 제목 추가

<br>

<input id="prayInput" placeholder="기도 제목 입력">

<br>

<button onclick="addPray()">저장</button>

</div>

<div id="prayList"></div>

</div>


<!-- 일정 -->

<div id="schedule" class="page">

<div class="card">

📅 일정 추가

<br>

<input id="scheduleInput" placeholder="일정 입력">

<br>

<button onclick="addSchedule()">저장</button>

</div>

<div id="scheduleList"></div>

</div>


<!-- 생일 -->

<div id="birthday" class="page">

<div class="card">

🎂 생일 추가

<br>

<input id="birthdayInput" placeholder="예: 엄마 5월10일">

<br>

<button onclick="addBirthday()">저장</button>

</div>

<div id="birthdayList"></div>

</div>


<!-- 사진 -->

<div id="photo" class="page">

<div class="card">

🖼️ 가족 사진 올리기

<br>

<input id="photoInput" class="photo-input" type="file" accept="image/*">

<div id="photoStatus" style="margin-top:12px;font-size:16px;color:#666;"></div>

</div>

<div id="photoList"></div>

</div>


<!-- 하단 메뉴 -->

<div class="navbar">

<button class="navbtn" onclick="showPage('home')">🏠</button>

<button class="navbtn" onclick="showPage('pray')">🙏</button>

<button class="navbtn" onclick="showPage('schedule')">📅</button>

<button class="navbtn" onclick="showPage('birthday')">🎂</button>

<button class="navbtn" onclick="showPage('photo')">🖼️</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="public-config.js"></script>

<script>

const PUBLIC_APP_CONFIG=window.PUBLIC_APP_CONFIG||{}
const CLOUDINARY_CONFIG=PUBLIC_APP_CONFIG.cloudinary||{}
const SUPABASE_CONFIG=PUBLIC_APP_CONFIG.supabase||{}
const PHOTO_CONFIG=PUBLIC_APP_CONFIG.photos||{}
const SCHEDULE_CONFIG=PUBLIC_APP_CONFIG.schedule||{}
const VERSE_CONFIG=PUBLIC_APP_CONFIG.verse||{}

let supabaseReady=false
let supabaseClient=null
let supabaseChannel=null

function canUseCloudinaryUpload(){

let cloudName=CLOUDINARY_CONFIG.cloudName
let uploadPreset=CLOUDINARY_CONFIG.uploadPreset

return PHOTO_CONFIG.allowDirectUpload===true
&&typeof cloudName==="string"
&&cloudName.trim()!==""
&&typeof uploadPreset==="string"
&&uploadPreset.trim()!==""

}

function isSharedGalleryEnabled(){

return PHOTO_CONFIG.enableSharedGallery!==false

}

function isSharedGalleryReadOnly(){

return PHOTO_CONFIG.readOnly!==false

}

function canManageSharedPhotos(){

return isSharedGalleryEnabled()
&&canUseSupabase()
&&canUseCloudinaryUpload()
&&isSharedGalleryReadOnly()===false

}

function updatePhotoStatus(){

let input=document.getElementById("photoInput")
let status=document.getElementById("photoStatus")

if(isSharedGalleryEnabled()&&canUseSupabase()){
if(canManageSharedPhotos()){
input.disabled=false
status.innerText="공유 사진 업로드가 활성화되어 있습니다."
return
}

input.disabled=true
status.innerText="GitHub Pages 공개 배포용 안전 모드입니다. 사진 목록은 읽기 전용으로 표시됩니다."
return
}

input.disabled=false
status.innerText="현재 기기에서만 로컬 사진 저장을 사용할 수 있습니다."

}

function canUseSupabase(){

let url=SUPABASE_CONFIG.url
let anonKey=SUPABASE_CONFIG.anonKey

return typeof url==="string"
&&url.trim()!==""
&&typeof anonKey==="string"
&&anonKey.trim()!==""

}

async function initSupabase(){

if(!canUseSupabase())return
if(typeof window.supabase==="undefined")return

supabaseClient=window.supabase.createClient(
SUPABASE_CONFIG.url.trim(),
SUPABASE_CONFIG.anonKey.trim()
)
supabaseReady=true

}

function cleanupPhotoSubscriptions(){

if(supabaseReady&&supabaseClient&&supabaseChannel){
supabaseClient.removeChannel(supabaseChannel)
supabaseChannel=null
}

}

async function loadSupabasePhotos(){

if(!supabaseReady||!supabaseClient)return

let {data,error}=await supabaseClient
.from("photos")
.select("id,url,created_at")
.order("created_at",{ascending:false})

if(error){
throw error
}

let html=""

;(data||[]).forEach(row=>{
if(row.url){
html+=`<div class="card"><img src="${escapeHtml(row.url)}" class="gallery-img">${canManageSharedPhotos()?`<button onclick="removePhoto('supabase',${row.id}).catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button>`:""}</div>`
}
})

document.getElementById("photoList").innerHTML=html

if(!supabaseChannel){
supabaseChannel=supabaseClient
.channel("photos-changes")
.on("postgres_changes",{
event:"*",
schema:"public",
table:"photos"
},()=>{
loadSupabasePhotos().catch(()=>{})
})
.subscribe()
}

}

/* 페이지 이동 */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

if(page==="schedule"){
loadSchedule().catch(()=>{})
}

}


/* XSS 방지 */

function escapeHtml(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;")
}

/* 기도 */

function addPray(){

let text=document.getElementById("prayInput").value.trim()

if(text==="")return

let list=JSON.parse(localStorage.getItem("pray")||"[]")

list.push(text)

try{
localStorage.setItem("pray",JSON.stringify(list))
}catch(e){
alert("저장 공간이 부족해서 저장하지 못했어요.")
return
}

document.getElementById("prayInput").value=""

loadPray()

}

function loadPray(){

let list=JSON.parse(localStorage.getItem("pray")||"[]")

let html=""

list.forEach(i=>{
html+=`<div class="card">${escapeHtml(i)}</div>`
})

document.getElementById("prayList").innerHTML=html

}


/* 일정 */

function addSchedule(){

let text=document.getElementById("scheduleInput").value.trim()

if(text==="")return

let list=JSON.parse(localStorage.getItem("schedule")||"[]")

list.push(text)

try{
localStorage.setItem("schedule",JSON.stringify(list))
}catch(e){
alert("저장 공간이 부족해서 저장하지 못했어요.")
return
}

document.getElementById("scheduleInput").value=""

loadSchedule().catch(()=>{})

}

function getScheduleSheetUrl(){

let url=SCHEDULE_CONFIG.sheetUrl

return typeof url==="string"&&url.trim()!==""
?url.trim()
:""

}

function getVerseSheetUrl(){

let url=VERSE_CONFIG.sheetUrl

return typeof url==="string"&&url.trim()!==""
?url.trim()
:""

}

function getScheduleFieldMap(){

let fieldMap=SCHEDULE_CONFIG.fields

if(!fieldMap||typeof fieldMap!=="object"){
return {
date:"date",
time:"time",
detail:"detail"
}
}

return {
date:typeof fieldMap.date==="string"&&fieldMap.date.trim()!==""?fieldMap.date.trim():"date",
time:typeof fieldMap.time==="string"&&fieldMap.time.trim()!==""?fieldMap.time.trim():"time",
detail:typeof fieldMap.detail==="string"&&fieldMap.detail.trim()!==""?fieldMap.detail.trim():"detail"
}

}

function getVerseFieldMap(){

let fieldMap=VERSE_CONFIG.fields

if(!fieldMap||typeof fieldMap!=="object"){
return {
date:"date",
text:"verse"
}
}

return {
date:typeof fieldMap.date==="string"&&fieldMap.date.trim()!==""?fieldMap.date.trim():"date",
text:typeof fieldMap.text==="string"&&fieldMap.text.trim()!==""?fieldMap.text.trim():"verse"
}

}

function getTodaySeoulDate(){

return new Intl.DateTimeFormat("sv-SE",{
timeZone:"Asia/Seoul"
}).format(new Date())

}

function renderScheduleCards(items){

let fieldMap=getScheduleFieldMap()

let html=""

items.forEach(item=>{
let lines=[]

if(typeof item==="string"){
if(item.trim()!==""){
lines.push(item.trim())
}
}else if(item&&typeof item==="object"){
let dateValue=item[fieldMap.date]
let timeValue=item[fieldMap.time]
let detailValue=item[fieldMap.detail]

if(typeof dateValue==="string"&&dateValue.trim()!==""){
lines.push(dateValue.trim())
}

if(typeof timeValue==="string"&&timeValue.trim()!==""){
lines.push(timeValue.trim())
}

if(typeof detailValue==="string"&&detailValue.trim()!==""){
lines.push(detailValue.trim())
}
}

if(lines.length>0){
html+=`<div class="card">${lines.map(line=>escapeHtml(line)).join("<br>")}</div>`
}
})

return html

}

async function loadSchedule(){

let localList=JSON.parse(localStorage.getItem("schedule")||"[]")
let sheetUrl=getScheduleSheetUrl()

if(sheetUrl===""){
document.getElementById("scheduleList").innerHTML=renderScheduleCards(localList)
return
}

try{
let res=await fetch(sheetUrl)

if(!res.ok){
throw new Error("network_error")
}

let remoteList=await res.json()
let normalizedList=Array.isArray(remoteList)?remoteList:[]
let mergedList=normalizedList.concat(localList)
let html=renderScheduleCards(mergedList)

document.getElementById("scheduleList").innerHTML=html||'<div class="card">일정이 없어요.</div>'
}catch(e){
document.getElementById("scheduleList").innerHTML=renderScheduleCards(localList)||'<div class="card">일정을 불러올 수 없어요.</div>'
}

}


/* 생일 */

function addBirthday(){

let text=document.getElementById("birthdayInput").value.trim()

if(text==="")return

let list=JSON.parse(localStorage.getItem("birthday")||"[]")

list.push(text)

try{
localStorage.setItem("birthday",JSON.stringify(list))
}catch(e){
alert("저장 공간이 부족해서 저장하지 못했어요.")
return
}

document.getElementById("birthdayInput").value=""

loadBirthday()

}

function loadBirthday(){

let list=JSON.parse(localStorage.getItem("birthday")||"[]")

let html=""

list.forEach(i=>{
html+=`<div class="card">${escapeHtml(i)}</div>`
})

document.getElementById("birthdayList").innerHTML=html

}


/* 사진 */

async function addPhoto(file){

if(canManageSharedPhotos()){

let cloudName=CLOUDINARY_CONFIG.cloudName.trim()
let uploadPreset=CLOUDINARY_CONFIG.uploadPreset.trim()

let uploadUrl=`https://api.cloudinary.com/v1_1/${encodeURIComponent(cloudName)}/image/upload`
let formData=new FormData()
formData.append("file",file)
formData.append("upload_preset",uploadPreset)
formData.append("folder","family-app")

let uploadRes=await fetch(uploadUrl,{
method:"POST",
body:formData
})

if(!uploadRes.ok){
throw new Error("cloudinary_upload_failed")
}

let uploadData=await uploadRes.json()
let url=uploadData.secure_url||uploadData.url||""
let deleteToken=uploadData.delete_token||""

if(url===""){
throw new Error("cloudinary_url_missing")
}

if(supabaseReady&&supabaseClient){
let {error}=await supabaseClient
.from("photos")
.insert({
url:url,
delete_token:deleteToken||null
})

if(error){
throw new Error("supabase_insert_failed")
}
}else{
let cloudList=JSON.parse(localStorage.getItem("cloudinaryPhotos")||"[]")
cloudList.unshift({
url:url,
deleteToken:deleteToken
})

try{
localStorage.setItem("cloudinaryPhotos",JSON.stringify(cloudList))
}catch(e){
alert("저장 공간이 부족해서 사진 링크를 저장하지 못했어요.")
return
}
}

return

}

if(isSharedGalleryEnabled()&&canUseSupabase()){
throw new Error("shared_gallery_read_only")
}

let reader=new FileReader()

reader.onload=event=>{
let base64=event.target.result

let list=JSON.parse(localStorage.getItem("photos")||"[]")

list.unshift(base64)

try{
localStorage.setItem("photos",JSON.stringify(list))
}catch(e){
alert("저장 공간이 부족해서 사진을 저장하지 못했어요.")
return
}

loadPhotos().catch(()=>{})

}

reader.readAsDataURL(file)

}

async function deleteCloudinaryOriginal(deleteToken){

if(typeof deleteToken!=="string"||deleteToken.trim()===""){
return {
attempted:false,
ok:false,
message:"삭제 토큰이 없어 원본 삭제를 건너뛰었습니다."
}
}

if(!canUseCloudinaryUpload()){
return {
attempted:false,
ok:false,
message:"Cloudinary 설정이 없어 원본 삭제를 건너뛰었습니다."
}
}

let cloudName=CLOUDINARY_CONFIG.cloudName.trim()
let deleteUrl=`https://api.cloudinary.com/v1_1/${encodeURIComponent(cloudName)}/delete_by_token`
let formData=new FormData()
formData.append("token",deleteToken.trim())

try{
let response=await fetch(deleteUrl,{
method:"POST",
body:formData
})

if(!response.ok){
let errorMessage=`HTTP ${response.status}`
try{
let errorData=await response.json()
if(errorData&&errorData.error&&errorData.error.message){
errorMessage=errorData.error.message
}
}catch(e){
}

return {
attempted:true,
ok:false,
message:errorMessage
}
}

let resultData={}
try{
resultData=await response.json()
}catch(e){
}

if(resultData&&resultData.result&&resultData.result!=="ok"){
return {
attempted:true,
ok:false,
message:String(resultData.result)
}
}

return {
attempted:true,
ok:true,
message:""
}
}catch(e){
return {
attempted:true,
ok:false,
message:"네트워크 오류"
}
}

}

async function removePhoto(mode,key){

let ok=confirm("이 사진을 삭제할까요?")
if(!ok)return

if(mode==="supabase"){
if(!canManageSharedPhotos()){
throw new Error("shared_gallery_read_only")
}
if(!supabaseReady||!supabaseClient)return
let {data:photoRow}=await supabaseClient
.from("photos")
.select("delete_token")
.eq("id",key)
.maybeSingle()

let cloudinaryDeleteResult=await deleteCloudinaryOriginal((photoRow&&photoRow.delete_token)||"")
if(cloudinaryDeleteResult.attempted&&!cloudinaryDeleteResult.ok){
alert(`Cloudinary 원본 삭제 실패: ${cloudinaryDeleteResult.message}`)
}

let {error}=await supabaseClient
.from("photos")
.delete()
.eq("id",key)

if(error){
throw new Error("supabase_delete_failed")
}
return
}

if(mode==="cloudinary-local"){
let list=JSON.parse(localStorage.getItem("cloudinaryPhotos")||"[]")
let item=list[key]
let deleteToken=typeof item==="string"?"":((item&&item.deleteToken)||"")
let cloudinaryDeleteResult=await deleteCloudinaryOriginal(deleteToken)
if(cloudinaryDeleteResult.attempted&&!cloudinaryDeleteResult.ok){
alert(`Cloudinary 원본 삭제 실패: ${cloudinaryDeleteResult.message}`)
}
list.splice(key,1)
localStorage.setItem("cloudinaryPhotos",JSON.stringify(list))
await loadPhotos()
return
}

if(mode==="local"){
let list=JSON.parse(localStorage.getItem("photos")||"[]")
list.splice(key,1)
localStorage.setItem("photos",JSON.stringify(list))
await loadPhotos()
}

}

async function loadPhotos(){

cleanupPhotoSubscriptions()

if(supabaseReady&&supabaseClient){
await loadSupabasePhotos()
return
}

if(canUseCloudinaryUpload()){

let cloudList=JSON.parse(localStorage.getItem("cloudinaryPhotos")||"[]")

let cloudHtml=""

cloudList.forEach((item,index)=>{
let url=typeof item==="string"?item:((item&&item.url)||"")
if(url!=""){
cloudHtml+=`<div class="card"><img src="${escapeHtml(url)}" class="gallery-img"><button onclick="removePhoto('cloudinary-local',${index}).catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button></div>`
}
})

document.getElementById("photoList").innerHTML=cloudHtml

return

}

let list=JSON.parse(localStorage.getItem("photos")||"[]")

let html=""

list.forEach((src,index)=>{
html+=`<div class="card"><img src="${src}" class="gallery-img"><button onclick="removePhoto('local',${index}).catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button></div>`
})

document.getElementById("photoList").innerHTML=html

}

function setupPhotoUpload(){

let input=document.getElementById("photoInput")
let maxSizeBytes=5*1024*1024

input.addEventListener("change",e=>{

let file=e.target.files[0]

if(!file)return

if(!file.type||!file.type.startsWith("image/")){
alert("이미지 파일만 업로드할 수 있어요.")
input.value=""
return
}

if(file.size>maxSizeBytes){
alert("사진 용량은 5MB 이하만 업로드할 수 있어요.")
input.value=""
return
}

addPhoto(file)
.catch(error=>{
if(error&&error.message==="shared_gallery_read_only"){
alert("공개 배포 안전 모드에서는 사진 업로드가 비활성화되어 있어요.")
return
}
alert("사진 업로드 중 오류가 발생했어요.")
})
.finally(()=>{
input.value=""
})

})

}

async function loadVerse(){

try{

const url=getVerseSheetUrl()
const fieldMap=getVerseFieldMap()

if(url===""){
throw new Error("missing_sheet_url")
}

let res=await fetch(url)

if(!res.ok) throw new Error("network error")

let data=await res.json()

let today=getTodaySeoulDate()

let verse=""

data.forEach(row=>{

if(row&&row[fieldMap.date]==today){

verse=row[fieldMap.text]

}

})

if(verse==""){

verse=data[0]?.[fieldMap.text]||""

}

document.getElementById("verseText").innerText=verse||"말씀을 불러올 수 없어요."

}catch(e){

document.getElementById("verseText").innerText="말씀을 불러올 수 없어요."

}

}

loadVerse()

loadPray()
loadSchedule()
loadBirthday()
updatePhotoStatus()
Promise.allSettled([
initSupabase()
])
.finally(()=>{
loadPhotos().catch(()=>{})
setupPhotoUpload()
})


/* PWA */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
