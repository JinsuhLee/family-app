<script>

const FIREBASE_CONFIG=window.FIREBASE_CONFIG||{}
const CLOUDINARY_CONFIG=window.CLOUDINARY_CONFIG||{}
const SUPABASE_CONFIG=window.SUPABASE_CONFIG||{}

let cloudReady=false
let firestoreDb=null
let photoUnsubscribe=null
let supabaseReady=false
let supabaseClient=null
let supabaseChannel=null

async function initFirebase(){

const requiredKeys=["apiKey","authDomain","projectId","storageBucket","messagingSenderId","appId"]
const configOk=requiredKeys.every(key=>{
let value=FIREBASE_CONFIG[key]
return typeof value==="string"&&value.trim()!==""
})

if(!configOk)return

if(firebase.apps.length===0){
firebase.initializeApp(FIREBASE_CONFIG)
}

await firebase.auth().signInAnonymously()

firestoreDb=firebase.firestore()
cloudReady=true

}

function canUseCloudinaryUpload(){

let cloudName=CLOUDINARY_CONFIG.cloudName
let uploadPreset=CLOUDINARY_CONFIG.uploadPreset

return typeof cloudName==="string"
&&cloudName.trim()!==""
&&typeof uploadPreset==="string"
&&uploadPreset.trim()!==""

}

function canUseSupabase(){

let url=SUPABASE_CONFIG.url
let anonKey=SUPABASE_CONFIG.anonKey

return typeof url==="string"
&&url.trim()!==""
&&typeof anonKey==="string"
&&anonKey.trim()!==""

}

async function initSupabase(){

if(!canUseSupabase())return
if(typeof window.supabase==="undefined")return

supabaseClient=window.supabase.createClient(
SUPABASE_CONFIG.url.trim(),
SUPABASE_CONFIG.anonKey.trim()
)
supabaseReady=true

}

function cleanupPhotoSubscriptions(){

if(photoUnsubscribe){
photoUnsubscribe()
photoUnsubscribe=null
}

if(supabaseReady&&supabaseClient&&supabaseChannel){
supabaseClient.removeChannel(supabaseChannel)
supabaseChannel=null
async function loadRemoteSchedule(){
  try{
    const url = "https://sheetdb.io/api/v1/x97irced8j3de";
    let res = await fetch(url);
    if(!res.ok) throw new Error("network error");
    let data = await res.json();
    let html = "";
    (data||[]).forEach(row=>{
      if(row.schedule){
        html += `<div class=\"card\">${escapeHtml(row.schedule)}</div>`;
      }
    });
    document.getElementById("scheduleList").innerHTML = html;
  }catch(e){
    // fallback: local storage 일정 사용
    loadSchedule();
  }
}

}

async function loadSupabasePhotos(){

if(!supabaseReady||!supabaseClient)return

let {data,error}=await supabaseClient
.from("photos")
.select("id,url,created_at")
.order("created_at",{ascending:false})

if(error){
throw error
}

let html=""

;(data||[]).forEach(row=>{
if(row.url){
html+=`<div class="card"><img src="${escapeHtml(row.url)}" class="gallery-img"><button onclick="removePhoto('supabase',${row.id}).catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button></div>`
}
})

document.getElementById("photoList").innerHTML=html

if(!supabaseChannel){
supabaseChannel=supabaseClient
.channel("photos-changes")
.on("postgres_changes",{
event:"*",
schema:"public",
table:"photos"
},()=>{
loadSupabasePhotos().catch(()=>{})
})
.subscribe()
}

}

/* 페이지 이동 */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}


/* XSS 방지 */

function escapeHtml(str){
return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;")
}

/* 기도 */

function addPray(){

let text=document.getElementById("prayInput").value.trim()

if(text==="")return

let list=JSON.parse(localStorage.getItem("pray")||"[]")

list.push(text)

try{
localStorage.setItem("pray",JSON.stringify(list))
}catch(e){
alert("저장 공간이 부족해서 저장하지 못했어요.")
return
}

document.getElementById("prayInput").value=""

loadPray()

}

function loadPray(){

let list=JSON.parse(localStorage.getItem("pray")||"[]")

let html=""

list.forEach(i=>{
html+=`<div class="card">${escapeHtml(i)}</div>`
})

document.getElementById("prayList").innerHTML=html

}

/* 사진 */

async function addPhoto(file){

if(canUseCloudinaryUpload()){

let cloudName=CLOUDINARY_CONFIG.cloudName.trim()
let uploadPreset=CLOUDINARY_CONFIG.uploadPreset.trim()

let uploadUrl=`https://api.cloudinary.com/v1_1/${encodeURIComponent(cloudName)}/image/upload`
let formData=new FormData()
formData.append("file",file)
formData.append("upload_preset",uploadPreset)
formData.append("folder","family-app")

let uploadRes=await fetch(uploadUrl,{
method:"POST",
body:formData
})

if(!uploadRes.ok){
throw new Error("cloudinary_upload_failed")
}

let uploadData=await uploadRes.json()
let url=uploadData.secure_url||uploadData.url||""
let deleteToken=uploadData.delete_token||""

if(url===""){
throw new Error("cloudinary_url_missing")
}

if(cloudReady&&firestoreDb){
await firestoreDb.collection("photos").add({
url:url,
deleteToken:deleteToken,
createdAt:firebase.firestore.FieldValue.serverTimestamp()
})
}else if(supabaseReady&&supabaseClient){
let {error}=await supabaseClient
.from("photos")
.insert({
url:url,
delete_token:deleteToken||null
})

if(error){
throw new Error("supabase_insert_failed")
}
}else{
let cloudList=JSON.parse(localStorage.getItem("cloudinaryPhotos")||"[]")
cloudList.unshift({
url:url,
deleteToken:deleteToken
})

try{
localStorage.setItem("cloudinaryPhotos",JSON.stringify(cloudList))
}catch(e){
alert("저장 공간이 부족해서 사진 링크를 저장하지 못했어요.")
return
}
}

return

}

let reader=new FileReader()

reader.onload=event=>{
let base64=event.target.result

let list=JSON.parse(localStorage.getItem("photos")||"[]")

list.unshift(base64)

try{
localStorage.setItem("photos",JSON.stringify(list))
}catch(e){
alert("저장 공간이 부족해서 사진을 저장하지 못했어요.")
return
}

loadPhotos().catch(()=>{})

}

reader.readAsDataURL(file)

}

async function deleteCloudinaryOriginal(deleteToken){

if(typeof deleteToken!=="string"||deleteToken.trim()===""){
return {
attempted:false,
ok:false,
message:"삭제 토큰이 없어 원본 삭제를 건너뛰었습니다."
}
}

if(!canUseCloudinaryUpload()){
return {
attempted:false,
ok:false,
message:"Cloudinary 설정이 없어 원본 삭제를 건너뛰었습니다."
}
}

let cloudName=CLOUDINARY_CONFIG.cloudName.trim()
let deleteUrl=`https://api.cloudinary.com/v1_1/${encodeURIComponent(cloudName)}/delete_by_token`
let formData=new FormData()
formData.append("token",deleteToken.trim())

try{
let response=await fetch(deleteUrl,{
method:"POST",
body:formData
})

if(!response.ok){
let errorMessage=`HTTP ${response.status}`
try{
let errorData=await response.json()
if(errorData&&errorData.error&&errorData.error.message){
errorMessage=errorData.error.message
}
}catch(e){
}

return {
attempted:true,
ok:false,
message:errorMessage
}
}

let resultData={}
try{
resultData=await response.json()
}catch(e){
}

if(resultData&&resultData.result&&resultData.result!=="ok"){
return {
attempted:true,
ok:false,
message:String(resultData.result)
}
}

return {
attempted:true,
ok:true,
message:""
}
}catch(e){
return {
attempted:true,
ok:false,
message:"네트워크 오류"
}
}

}

async function removePhoto(mode,key){

let ok=confirm("이 사진을 삭제할까요?")
if(!ok)return

if(mode==="firebase"){
if(!cloudReady||!firestoreDb)return
let docRef=firestoreDb.collection("photos").doc(key)
let doc=await docRef.get()
let data=doc.exists?doc.data():null
let cloudinaryDeleteResult=await deleteCloudinaryOriginal((data&&data.deleteToken)||"")
if(cloudinaryDeleteResult.attempted&&!cloudinaryDeleteResult.ok){
alert(`Cloudinary 원본 삭제 실패: ${cloudinaryDeleteResult.message}`)
}
await docRef.delete()
return
}

if(mode==="supabase"){
if(!supabaseReady||!supabaseClient)return
let {data:photoRow}=await supabaseClient
.from("photos")
.select("delete_token")
.eq("id",key)
.maybeSingle()

let cloudinaryDeleteResult=await deleteCloudinaryOriginal((photoRow&&photoRow.delete_token)||"")
if(cloudinaryDeleteResult.attempted&&!cloudinaryDeleteResult.ok){
alert(`Cloudinary 원본 삭제 실패: ${cloudinaryDeleteResult.message}`)
}

let {error}=await supabaseClient
.from("photos")
.delete()
.eq("id",key)

if(error){
throw new Error("supabase_delete_failed")
}
return
}

if(mode==="cloudinary-local"){
let list=JSON.parse(localStorage.getItem("cloudinaryPhotos")||"[]")
let item=list[key]
let deleteToken=typeof item==="string"?"":((item&&item.deleteToken)||"")
let cloudinaryDeleteResult=await deleteCloudinaryOriginal(deleteToken)
if(cloudinaryDeleteResult.attempted&&!cloudinaryDeleteResult.ok){
alert(`Cloudinary 원본 삭제 실패: ${cloudinaryDeleteResult.message}`)
}
list.splice(key,1)
localStorage.setItem("cloudinaryPhotos",JSON.stringify(list))
await loadPhotos()
return
}

if(mode==="local"){
let list=JSON.parse(localStorage.getItem("photos")||"[]")
list.splice(key,1)
localStorage.setItem("photos",JSON.stringify(list))
await loadPhotos()
}

}

async function loadPhotos(){

cleanupPhotoSubscriptions()

if(cloudReady){

photoUnsubscribe=firestoreDb.collection("photos")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

let html=""

snapshot.forEach(doc=>{
let data=doc.data()
if(data.url){
html+=`<div class="card"><img src="${escapeHtml(data.url)}" class="gallery-img"><button onclick="removePhoto('firebase','${doc.id}').catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button></div>`
}
})

document.getElementById("photoList").innerHTML=html

})

return

}

if(supabaseReady&&supabaseClient){
await loadSupabasePhotos()
return
}

if(canUseCloudinaryUpload()){

let cloudList=JSON.parse(localStorage.getItem("cloudinaryPhotos")||"[]")

let cloudHtml=""

cloudList.forEach((item,index)=>{
let url=typeof item==="string"?item:((item&&item.url)||"")
if(url!=""){
cloudHtml+=`<div class="card"><img src="${escapeHtml(url)}" class="gallery-img"><button onclick="removePhoto('cloudinary-local',${index}).catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button></div>`
}
})

document.getElementById("photoList").innerHTML=cloudHtml

return

}

let list=JSON.parse(localStorage.getItem("photos")||"[]")

let html=""

list.forEach((src,index)=>{
html+=`<div class="card"><img src="${src}" class="gallery-img"><button onclick="removePhoto('local',${index}).catch(()=>{alert('사진 삭제 중 오류가 발생했어요.')})">삭제</button></div>`
})

document.getElementById("photoList").innerHTML=html

}

function setupPhotoUpload(){

let input=document.getElementById("photoInput")
let maxSizeBytes=5*1024*1024

input.addEventListener("change",e=>{

let file=e.target.files[0]

if(!file)return

if(!file.type||!file.type.startsWith("image/")){
alert("이미지 파일만 업로드할 수 있어요.")
input.value=""
return
}

if(file.size>maxSizeBytes){
alert("사진 용량은 5MB 이하만 업로드할 수 있어요.")
input.value=""
return
}

addPhoto(file)
.catch(error=>{
alert("사진 업로드 중 오류가 발생했어요.")
})
.finally(()=>{
input.value=""
})

})

}

async function loadVerse(){

try{

const url="https://sheetdb.io/api/v1/0z7it7x68y6xl"

let res=await fetch(url)

if(!res.ok) throw new Error("network error")

let data=await res.json()

let today=new Intl.DateTimeFormat("sv-SE",{
timeZone:"Asia/Seoul"
}).format(new Date())

let verse=""

data.forEach(row=>{

if(row.date==today){

verse=row.verse

}

})

if(verse==""){

verse=data[0]?.verse||""

}

document.getElementById("verseText").innerText=verse||"말씀을 불러올 수 없어요."

}catch(e){

document.getElementById("verseText").innerText="말씀을 불러올 수 없어요."

}

}

loadVerse()

loadPray()
loadSchedule()
loadBirthday()
Promise.allSettled([
initFirebase(),
initSupabase()
])
.finally(()=>{
loadPhotos().catch(()=>{})
})
setupPhotoUpload()


/* PWA */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>
