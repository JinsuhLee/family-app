<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>우리 가족 앱</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:sans-serif;
margin:0;
background:#f4f4f4;
transition:0.3s;
}

.dark{
background:#1e1e1e;
color:white;
}

header{
background:#4CAF50;
color:white;
padding:15px;
font-size:22px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
padding-bottom:90px;
}

.screen{
display:none;
}

.active{
display:block;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
margin-bottom:15px;
}

.dark .card{
background:#333;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
border-top:1px solid #ddd;
padding:10px 0;
}

.dark .bottom-nav{
background:#222;
}

.nav-btn{
background:none;
border:none;
font-size:16px;
}

.gallery img{
width:100%;
border-radius:10px;
margin-top:10px;
}

textarea{
width:100%;
height:100px;
font-size:16px;
}

.install{
background:#2196F3;
margin-bottom:15px;
}

</style>

</head>

<body>

<header>

<span>우리 가족 앱</span>

<div>

<button onclick="toggleDark()">🌙</button>

</div>

</header>

<div class="container">

<!-- 홈 -->
<div id="home" class="screen active">

<button id="installBtn" class="install" style="display:none;">📲 앱 설치</button>

<div class="card">
👋 가족 앱에 오신 것을 환영합니다
</div>

<div class="card">
오늘도 행복한 하루 보내세요 😊
</div>

</div>

<!-- 사진 -->
<div id="photos" class="screen">

<div class="card">
📷 가족 사진
</div>

<input type="file" accept="image/*" onchange="addPhoto(event)">

<div id="gallery" class="gallery"></div>

</div>

<!-- 기도 -->
<div id="pray" class="screen">

<div class="card">
🙏 기도 제목
</div>

<textarea id="prayText"></textarea>

<button onclick="savePray()">저장</button>

<div id="prayList"></div>

</div>

<!-- 일정 -->
<div id="schedule" class="screen">

<div class="card">
📅 가족 일정
</div>

<input type="date">

<button onclick="alert('일정 저장')">추가</button>

</div>

</div>

<div class="bottom-nav">

<button class="nav-btn" onclick="show('home')">🏠 홈</button>

<button class="nav-btn" onclick="show('photos')">📷 사진</button>

<button class="nav-btn" onclick="show('pray')">🙏 기도</button>

<button class="nav-btn" onclick="show('schedule')">📅 일정</button>

</div>

<script>

function show(screen){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(screen).classList.add("active")

}

function toggleDark(){
document.body.classList.toggle("dark")
}

function addPhoto(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")

img.src=e.target.result

document.getElementById("gallery").appendChild(img)

saveGallery()

}

reader.readAsDataURL(file)

}

function saveGallery(){

localStorage.setItem("gallery",document.getElementById("gallery").innerHTML)

}

function loadGallery(){

let data=localStorage.getItem("gallery")

if(data){

document.getElementById("gallery").innerHTML=data

}

}

function savePray(){

let text=document.getElementById("prayText").value

let list=document.getElementById("prayList")

let div=document.createElement("div")

div.className="card"

div.innerText=text

list.appendChild(div)

savePrayList()

}

function savePrayList(){

localStorage.setItem("pray",document.getElementById("prayList").innerHTML)

}

function loadPray(){

let data=localStorage.getItem("pray")

if(data){

document.getElementById("prayList").innerHTML=data

}

}

loadGallery()
loadPray()

// PWA install button

let deferredPrompt

const installBtn=document.getElementById("installBtn")

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

installBtn.style.display="block"

})

installBtn.addEventListener("click",()=>{

installBtn.style.display="none"

deferredPrompt.prompt()

})

// service worker

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>
</html>
