<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4CAF50">

<title>오리지날 LEE</title>

<link rel="manifest" href="manifest.json">

<style>

body{
margin:0;
font-family:sans-serif;
background:#f4f4f4;
font-size:20px;
text-align:center;
}

/* 상단 타이틀 */

header{
background:#4CAF50;
color:white;
padding:22px;
font-size:34px;
font-weight:bold;
}

/* 페이지 */

.page{
display:none;
padding:20px;
padding-bottom:120px;
}

.active{
display:block;
}

/* 카드 */

.card{
background:white;
padding:25px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
font-size:24px;
}

/* 가족 이미지 */

.family-img{
width:90%;
max-width:350px;
border-radius:20px;
margin:20px auto;
display:block;
}

/* 말씀 */

.verse-title{
font-size:26px;
font-weight:bold;
margin-top:10px;
}

.verse-text{
font-size:22px;
margin-top:10px;
line-height:1.6;
}

/* 입력 */

input{
width:95%;
padding:18px;
font-size:22px;
border-radius:10px;
border:1px solid #ccc;
margin-top:15px;
}

/* 버튼 */

button{
margin-top:15px;
padding:15px 30px;
font-size:22px;
border-radius:10px;
border:none;
background:#4CAF50;
color:white;
}

/* 하단 메뉴 */

.navbar{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px 0;
box-shadow:0 -2px 8px rgba(0,0,0,0.2);
}

.navbtn{
font-size:32px;
background:none;
border:none;
}

</style>

</head>

<body>

<header>
오리지날 LEE
</header>


<!-- 홈 -->

<div id="home" class="page active">

<img src="family.jpg" class="family-img">

<div class="card">

<div class="verse-title">
📖 오늘의 말씀
</div>

<div id="verseText" class="verse-text">



</div>

</div>

</div>


<!-- 기도 -->

<div id="pray" class="page">

<div class="card">

🙏 기도 제목 추가

<br>

<input id="prayInput" placeholder="기도 제목 입력">

<br>

<button onclick="addPray()">저장</button>

</div>

<div id="prayList"></div>

</div>


<!-- 일정 -->

<div id="schedule" class="page">

<div class="card">

📅 일정 추가

<br>

<input id="scheduleInput" placeholder="일정 입력">

<br>

<button onclick="addSchedule()">저장</button>

</div>

<div id="scheduleList"></div>

</div>


<!-- 생일 -->

<div id="birthday" class="page">

<div class="card">

🎂 생일 추가

<br>

<input id="birthdayInput" placeholder="예: 엄마 5월10일">

<br>

<button onclick="addBirthday()">저장</button>

</div>

<div id="birthdayList"></div>

</div>


<!-- 하단 메뉴 -->

<div class="navbar">

<button class="navbtn" onclick="showPage('home')">🏠</button>

<button class="navbtn" onclick="showPage('pray')">🙏</button>

<button class="navbtn" onclick="showPage('schedule')">📅</button>

<button class="navbtn" onclick="showPage('birthday')">🎂</button>

</div>


<script>

/* 페이지 이동 */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}


/* 기도 */

function addPray(){

let text=document.getElementById("prayInput").value

if(text==="")return

let list=JSON.parse(localStorage.getItem("pray")||"[]")

list.push(text)

localStorage.setItem("pray",JSON.stringify(list))

document.getElementById("prayInput").value=""

loadPray()

}

function loadPray(){

let list=JSON.parse(localStorage.getItem("pray")||"[]")

let html=""

list.forEach(i=>{
html+=`<div class="card">${i}</div>`
})

document.getElementById("prayList").innerHTML=html

}


/* 일정 */

function addSchedule(){

let text=document.getElementById("scheduleInput").value

if(text==="")return

let list=JSON.parse(localStorage.getItem("schedule")||"[]")

list.push(text)

localStorage.setItem("schedule",JSON.stringify(list))

document.getElementById("scheduleInput").value=""

loadSchedule()

}

function loadSchedule(){

let list=JSON.parse(localStorage.getItem("schedule")||"[]")

let html=""

list.forEach(i=>{
html+=`<div class="card">${i}</div>`
})

document.getElementById("scheduleList").innerHTML=html

}


/* 생일 */

function addBirthday(){

let text=document.getElementById("birthdayInput").value

if(text==="")return

let list=JSON.parse(localStorage.getItem("birthday")||"[]")

list.push(text)

localStorage.setItem("birthday",JSON.stringify(list))

document.getElementById("birthdayInput").value=""

loadBirthday()

}

function loadBirthday(){

let list=JSON.parse(localStorage.getItem("birthday")||"[]")

let html=""

list.forEach(i=>{
html+=`<div class="card">${i}</div>`
})

document.getElementById("birthdayList").innerHTML=html

}

async function loadVerse(){

const url="https://docs.google.com/spreadsheets/d/17hULHxcYPTGLHat_9gxCEH8DiSvLeh1hTmT6WvvkR5s/edit?gid=0#gid=0"

let res=await fetch(url)

let text=await res.text()

let rows=text.split("\n")

let today=new Date().toISOString().slice(0,10)

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",")

if(cols[0]==today){

document.getElementById("verseText").innerText=cols[1]

}

}

}

loadVerse()

loadPray()
loadSchedule()
loadBirthday()


/* PWA */

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('service-worker.js');
}

</script>

</body>

</html>
